# Simple Pipeline Configuration
# Demonstrates: DataProvider -> Algorithm with fan-out distribution

global:
  name: simple-pipeline
  version: "1.0"
  defaults:
    distribution: fan_out
    serialization: json

data_providers:
  - name: counter
    type: simple_counter
    config:
      count: 10
      start: 1

algorithms:
  - name: printer
    type: simple_printer

connections:
  - source: counter
    targets: [printer]
